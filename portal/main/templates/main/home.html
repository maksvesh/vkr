{% extends 'main/base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}

<h1 class="page-title">Вход</h1>

<div class="forma">
    {% if form.errors %}
        <div class="oshibka">Неправильный логин или пароль.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="pole">
            <label for="id_username">Логин</label>
            {{ form.username }}
        </div>
        <div class="pole">
            <label for="id_password">Пароль</label>
            {{ form.password }}
        </div>
        <button type="submit" class="knopka">Войти</button>
    </form>

    <p class="podpiska">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</div>

{% endblock %}
