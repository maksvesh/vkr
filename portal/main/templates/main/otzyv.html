{% extends 'main/base.html' %}
{% block title %}Оставить отзыв{% endblock %}
{% block content %}

<h1 class="page-title">Отзыв о курсе</h1>

<div class="forma">
    <p style="margin-bottom:16px;color:#555;">Заявка: <strong>{{ zayavka.urok }}</strong></p>
    <form method="post">
        {% csrf_token %}
        <div class="pole">
            <label for="id_otzyv">Ваш отзыв</label>
            <textarea name="otzyv" id="id_otzyv" rows="5" required placeholder="Напишите ваш отзыв об обучении..."></textarea>
        </div>
        <button type="submit" class="knopka">Сохранить отзыв</button>
    </form>
    <p class="podpiska"><a href="{% url 'kabinet' %}">← Назад</a></p>
</div>

{% endblock %}
